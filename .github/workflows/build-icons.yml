name: Build Icons

on:
  push:
    paths:
      - "svg/**"
      - "tenant_svgs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # 🟢 STEP 1 — BUST JSDELIVR CACHE IMMEDIATELY
      # Instead of pseudo-tags, use the RAW Git Hash (JSdelivr resolves this identically and instantly without 404 limits!)
      - name: Set release tag
        run: echo "TAG=${{ github.sha }}" >> "$GITHUB_ENV"

      # 🟢 STEP 2 — Extract Metadata
      - name: Extract metadata
        id: meta
        run: |
          MSG="${{ github.event.head_commit.message }}"
          HOST=$(echo "$MSG" | grep -oP '(?<=\[host:)[^\]]+' || echo 'admin.eazyiot.com')
          ORG=$(echo "$MSG" | grep -oP '(?<=\[org:)[^\]]+' || echo '')
          echo "HOST=$HOST" >> "$GITHUB_ENV"
          echo "ORG=$ORG" >> "$GITHUB_ENV"

      # 🟢 STEP 3 — Commit SVGs
      - name: Commit SVGs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add svg/ tenant_svgs/ || echo "Nothing to add"
          git commit -m "auto: add svg icons [skip ci]" || echo "Nothing to commit"
          git push origin HEAD || echo "Already pushed"

      # 🟢 STEP 4 — WAIT FOR CDN (Sort by NEWEST FILE)
      - name: Wait for jsDelivr
        run: |
          TARGET_DIR="svg"
          if [ "$HOST" != "admin.eazyiot.com" ] && [ -n "$ORG" ]; then
            TARGET_DIR="tenant_svgs/${HOST}${ORG}"
          fi

          if [ ! -d "$TARGET_DIR" ]; then 
            echo "$TARGET_DIR missing"
            exit 0
          fi

          # ✅ Sort dynamically by NEWEST (-t) to guarantee checking the icon JUST uploaded
          FILE=$(ls -t "$TARGET_DIR" | head -n 1)

          echo "Checking CDN for $TARGET_DIR/$FILE"

          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://cdn.jsdelivr.net/gh/JacobMire/icon-library@${TAG}/$TARGET_DIR/$FILE")

            if [ "$STATUS" = "200" ]; then
              echo "CDN ready"
              exit 0
            fi

            echo "Waiting ($i)..."
            sleep 3
          done

          echo "CDN not fully ready, continuing anyway"

      # 🟢 STEP 5 — NOW generate CSS
      - name: Generate CSS
        run: node scripts/generate-css.js
        env:
          TAG: ${{ env.TAG }}
          HOST: ${{ env.HOST }}
          ORG: ${{ env.ORG }}

      # 🟢 STEP 6 — commit CSS
      - name: Commit CSS
        run: |
          git add *.css
          git commit -m "auto: update icons CSS ($HOST) [skip ci]" || echo "No changes"
          git push origin HEAD

      # 🟢 STEP 7 — deploy
      - name: Upload icons.css to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
