name: Build Icons

on:
  push:
    paths:
      - "svg/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push, tag, and create releases

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node scripts/generate-css.js

      # Commit the updated icons.css and SVGs, then create a timestamped tag.
      # The tag is what makes @latest on jsDelivr point to this build.
      - name: Commit, tag, and push
        id: tag_step
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add svg/ icons.css
          git commit -m "auto: build icons [skip ci]" || echo "Nothing to commit"
          TAG="v$(date -u +'%Y%m%d%H%M%S')"
          git tag "$TAG"
          git push origin HEAD
          git push origin "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      # Publishing a GitHub Release is what moves @latest on jsDelivr.
      # Without this step, @latest never updates.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Icon build ${{ env.TAG }}"
          generate_release_notes: false

      # Purge jsDelivr's edge cache for the files that changed.
      # @latest is the only URL that matters now — no more @main.
      - name: Purge jsDelivr cache
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/JacobMire/icon-library@latest/icons.css" && echo "Purged icons.css"
          curl -sf "https://purge.jsdelivr.net/gh/JacobMire/icon-library@latest/svg/" && echo "Purged svg/"
