name: Build Icons

on:
  push:
    paths:
      - "svg/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # Generate a timestamped tag so SVG CDN URLs are pinned to this exact build
      - name: Set release tag
        run: echo "TAG=v$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_ENV"

      # Build icons.css with SVG URLs pinned to $TAG
      - run: node scripts/generate-css.js
        env:
          TAG: ${{ env.TAG }}

      # Commit SVGs + icons.css, then tag + release so jsDelivr can serve the pinned SVGs
      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add svg/ icons.css
          git commit -m "auto: build icons [skip ci]" || echo "Nothing to commit"
          git tag "$TAG"
          git push origin HEAD
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Icon build ${{ env.TAG }}"
          generate_release_notes: false

      # Deploy icons.css to GitHub Pages — this is what your <link> tag points to.
      # GitHub Pages serves directly from the repo with low caching; no CDN tag-resolution lag.
      - name: Upload icons.css to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # serves the whole repo root (icons.css lives here)

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
