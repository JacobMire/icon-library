name: Build Icons

on:
  push:
    paths:
      - "svg/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node scripts/generate-css.js

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add svg *.css
          git commit -m "auto: build icons" || echo "no changes"
          git push

      - name: Purge jsDelivr cache
        run: |
          curl "https://purge.jsdelivr.net/gh/JacobMire/icon-library@main/icons.css"
          curl "https://purge.jsdelivr.net/gh/JacobMire/icon-library@latest/icons.css"
          curl "https://purge.jsdelivr.net/gh/JacobMire/icon-library/icons.css"
